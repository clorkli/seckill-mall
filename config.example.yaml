server:
  name: "seckill-mall"
  port: "your_port_here"
  mode: "debug"

mysql:
  dsn: "" # 通过环境变量 SECKILL_MYSQL_DSN 注入

mq:
  url: "" # 通过环境变量 SECKILL_MQ_URL 注入

redis:
  addr: "localhost:6379"
  password: "password"
  db: 0

etcd:
  addr: "127.0.0.1:2379"

seckill:
  purchase_limit: 5 #配置限购件数，默认为5

jwt:
  expire: "24h"
  secret: "" # 通过环境变量 SECKILL_JWT_SECRET 注入